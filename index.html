<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahfuz | পোর্টফোলিও</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --text-main: #f1f5f9; 
            --text-muted: #94a3b8; 
            --accent: #38bdf8; 
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .portfolio-card {
            background-color: var(--card-bg);
            max-width: 450px;
            width: 100%;
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .image-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            padding: 5px;
            background-color: var(--card-bg);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .title {
            color: var(--accent);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .info-box {
            background-color: rgba(15, 23, 42, 0.5);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 14px;
            color: var(--text-muted);
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.03);
            line-height: 1.6;
        }

        .info-box p {
            margin-bottom: 10px;
        }

        .info-box strong {
            color: var(--text-main);
            display: block;
            margin-bottom: 2px;
        }

        /* বাটন গ্রিড আপডেট করা হয়েছে ৩টি কলামের জন্য */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .link-item:hover {
            transform: translateY(-3px);
            border-color: var(--accent);
        }

        /* বাটন কালার */
        .call { background: rgba(56, 189, 248, 0.1); color: #38bdf8; }
        .whatsapp { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
        .facebook { background: rgba(24, 119, 242, 0.1); color: #1877f2; }
        .mail { background: rgba(231, 76, 60, 0.1); color: #e74c3c; }
        .telegram { background: rgba(0, 136, 204, 0.1); color: #0088cc; }
        .imo { background: rgba(43, 115, 232, 0.1); color: #2b73e8; }

        @media (max-width: 480px) {
            .links-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="portfolio-card">
    <div class="image-container">
        <img src="photo.jpg" alt="Mahfuz Rana" class="profile-img">
    </div>
    
    <h1>Md Mahfuz Rana</h1>
    <p class="title">Student:Masjid Mission Academy(School & Collage</p>

    <div class="info-box">
        <p><strong>স্থায়ী ঠিকানা:</strong> গ্রামঃ বাজিতপুর (ইনায়েত বিশাসপাড়া), উপজেলাঃ শিবগঞ্জ, জেলাঃ চাঁপাইনবাবগঞ্জ।</p>
        <p><strong>বর্তমান ঠিকানা:</strong> রাজশাহী।</p>
    </div>

    <div class="links-grid">
        <a href="tel:+8801799264290" class="link-item call">📞 কল করুন</a>
        <a href="https://wa.me/8801799264290" class="link-item whatsapp">💬 WhatsApp</a>
        <a href="https://t.me/+8801799264290" class="link-item telegram">✈️ Telegram</a>
        <a href="imo:+8801799264290" class="link-item imo">📱 IMO</a>
        <a href="https://www.facebook.com/share/1BM9QbkLbU/" class="link-item facebook">👤 Facebook</a>
        <a href="mailto:mahfuzrana117@gmail.com" class="link-item mail">📧 Email</a>
    </div>
</div>

</body>
</html>
